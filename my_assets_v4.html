<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>资产账本 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .safe-area-inset-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .active-tab { color: #3b82f6; }
        .section-card { background-color: white; border-radius: 1rem; padding: 1rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); margin-bottom: 1rem; }
        .animate-slide { animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-active:active { transform: scale(0.95); opacity: 0.8; }
        .group-header { cursor: pointer; user-select: none; }
        .group-header:active { opacity: 0.7; }
        .group-content { max-height: 2000px; overflow: hidden; transition: max-height 0.3s ease-out; }
        .group-content.collapsed { max-height: 0; }
        .snapshot-item.selected { background-color: #eff6ff; border-color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <main class="pb-24">
        <!-- 页面一：资产概览 -->
        <div id="page-assets" class="p-4">
            <header class="mb-6">
                <h1 class="text-2xl font-bold text-gray-800">资产概览</h1>
                <p class="text-xs text-gray-500">实时计算您的实际可支配资金</p>
            </header>
            <div class="bg-slate-800 rounded-2xl p-6 mb-6 text-white shadow-xl">
                <div class="text-slate-400 text-sm mb-1 font-medium">实际可支配 (元)</div>
                <div id="finalResult" class="text-4xl font-bold tracking-tight">0.00</div>
                <div class="mt-4 flex justify-between text-xs text-slate-400 border-t border-slate-700 pt-3">
                    <span>总资产: <span id="totalAssetsHeader">0.00</span></span>
                    <span>调整项: <span id="adjustmentValue">0.00</span></span>
                </div>
            </div>
            <section class="mb-6">
                <div class="flex items-center mb-3">
                    <div class="w-1.5 h-4 bg-green-500 rounded-full mr-2"></div>
                    <h2 class="text-md font-bold text-gray-700">一、零钱资产</h2>
                </div>
                <div class="section-card border-t-4 border-green-500">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-green-600 font-bold">微信支付</span>
                        <span class="text-[10px] text-gray-400 bg-gray-50 px-2 py-1 rounded">小计: <span id="sub_wx">0.00</span></span>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] text-gray-400">零钱</label>
                            <input type="number" data-group="wx" data-type="asset" id="wx_lq" placeholder="0.00" inputmode="decimal" class="w-full bg-gray-50 rounded-xl px-4 py-2 outline-none border border-transparent focus:border-green-300 text-sm">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[10px] text-gray-400">零钱通</label>
                                <input type="number" data-group="wx" data-type="asset" id="wx_lqt" placeholder="0.00" inputmode="decimal" class="w-full bg-gray-50 rounded-xl px-4 py-2 outline-none border border-transparent text-sm">
                            </div>
                            <div>
                                <label class="text-[10px] text-gray-400">理财通</label>
                                <input type="number" data-group="wx" data-type="asset" id="wx_lct" placeholder="0.00" inputmode="decimal" class="w-full bg-gray-50 rounded-xl px-4 py-2 outline-none border border-transparent text-sm">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="section-card border-t-4 border-blue-500">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-blue-600 font-bold">支付宝</span>
                        <span class="text-[10px] text-gray-400 bg-gray-50 px-2 py-1 rounded">小计: <span id="sub_ali">0.00</span></span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] text-gray-400">余额</label>
                            <input type="number" data-group="ali" data-type="asset" id="ali_ye" placeholder="0.00" inputmode="decimal" class="w-full bg-gray-50 rounded-xl px-3 py-2 outline-none border border-transparent text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-400">余额宝</label>
                            <input type="number" data-group="ali" data-type="asset" id="ali_yeb" placeholder="0.00" inputmode="decimal" class="w-full bg-gray-50 rounded-xl px-3 py-2 outline-none border border-transparent text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-400">余利宝</label>
                            <input type="number" data-group="ali" data-type="asset" id="ali_ylb" placeholder="0.00" inputmode="decimal" class="w-full bg-gray-50 rounded-xl px-3 py-2 outline-none border border-transparent text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-400">理财产品</label>
                            <input type="number" data-group="ali" data-type="asset" id="ali_lc" placeholder="0.00" inputmode="decimal" class="w-full bg-gray-50 rounded-xl px-3 py-2 outline-none border border-transparent text-sm">
                        </div>
                    </div>
                </div>
                <div class="section-card border-t-4 border-red-500">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-red-600 font-bold">银行卡</span>
                        <span class="text-[10px] text-gray-400 bg-gray-50 px-2 py-1 rounded">小计: <span id="sub_bank">0.00</span></span>
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400">交通银行</label>
                        <input type="number" data-group="bank" data-type="asset" id="bank_jt" placeholder="0.00" inputmode="decimal" class="w-full bg-gray-50 rounded-xl px-4 py-2 outline-none border border-transparent text-sm">
                    </div>
                </div>
                <div class="bg-green-600 rounded-xl p-4 flex justify-between items-center shadow-lg shadow-green-100">
                    <span class="text-white font-bold text-sm">零钱资产总计</span>
                    <span id="totalAssetsSummary" class="text-xl font-bold text-white font-mono">0.00</span>
                </div>
            </section>
            <section>
                <div class="flex items-center mb-3">
                    <div class="w-1.5 h-4 bg-orange-500 rounded-full mr-2"></div>
                    <h2 class="text-md font-bold text-gray-700">二、调整项</h2>
                </div>
                <div class="bg-white rounded-xl p-5 shadow-sm border-l-4 border-orange-400 space-y-4">
                    <div>
                        <label class="text-[10px] text-gray-400">之前借出闲鱼店周转 (+)</label>
                        <input type="number" id="adj_lend" placeholder="0.00" inputmode="decimal" class="w-full bg-orange-50 rounded-xl px-4 py-2 outline-none border border-transparent text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400">闲鱼店账户应有 (-)</label>
                        <input type="number" id="adj_shop" placeholder="0.00" inputmode="decimal" class="w-full bg-gray-50 rounded-xl px-4 py-2 outline-none border border-transparent text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400">代付家庭余额 (-)</label>
                        <input type="number" id="adj_family" placeholder="0.00" inputmode="decimal" class="w-full bg-gray-50 rounded-xl px-4 py-2 outline-none border border-transparent text-sm">
                    </div>
                </div>
            </section>
            <div class="mt-12 mb-6 grid grid-cols-2 gap-3 px-2">
                <button onclick="createSnapshot()" class="text-[11px] text-blue-500 border border-blue-200 px-4 py-2 rounded-full bg-blue-50">生成今日快照</button>
                <button onclick="renderSnapshotModal()" class="text-[11px] text-purple-500 border border-purple-200 px-4 py-2 rounded-full bg-purple-50">快照回顾</button>
                <button onclick="exportData()" class="text-[11px] text-green-500 border border-green-200 px-4 py-2 rounded-full bg-green-50">导出数据备份</button>
                <button onclick="importData()" class="text-[11px] text-orange-500 border border-orange-200 px-4 py-2 rounded-full bg-orange-50">导入数据恢复</button>
            </div>
        </div>

        <!-- 页面二：收支记事 -->
        <div id="page-ledger" class="p-4 hidden animate-slide">
            <header class="mb-6">
                <h1 class="text-2xl font-bold text-gray-800">收支账本</h1>
            </header>
            <div class="bg-purple-900 rounded-2xl p-6 mb-6 text-white shadow-xl">
                <div class="text-purple-400 text-sm mb-1 font-medium">账面资产总数 (元)</div>
                <div id="ledgerTotal" class="text-4xl font-bold tracking-tight">0.00</div>
                <div class="mt-4 flex justify-between text-xs text-purple-400 border-t border-purple-800 pt-3">
                    <span>收支记录平衡</span>
                    <span>差异: <span id="ledgerDiff">0.00</span></span>
                </div>
            </div>
            <div class="bg-white rounded-2xl p-5 mb-8 shadow-sm border border-purple-100">
                <div class="grid grid-cols-2 gap-3">
                    <div class="col-span-2">
                        <input type="text" id="log_title" placeholder="事项说明" class="w-full bg-gray-50 rounded-xl px-4 py-3 outline-none text-sm border border-transparent focus:border-purple-300">
                    </div>
                    <div class="col-span-2 flex gap-2">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="log_type" value="expense" checked class="hidden">
                            <div id="type-expense" class="text-center py-2 rounded-xl bg-red-50 text-red-500 border border-red-200 text-sm font-medium">支出</div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="log_type" value="income" class="hidden">
                            <div id="type-income" class="text-center py-2 rounded-xl bg-gray-50 text-gray-400 border border-gray-200 text-sm font-medium">收入</div>
                        </label>
                    </div>
                    <select id="log_account" class="w-full bg-gray-50 rounded-xl px-3 py-2.5 outline-none text-sm">
                        <option value="微信支付">微信支付</option>
                        <option value="支付宝">支付宝</option>
                        <option value="银行卡">银行卡</option>
                        <option value="其他">其他</option>
                    </select>
                    <input type="date" id="log_date" class="w-full bg-gray-50 rounded-xl px-2 py-2.5 outline-none text-sm">
                    <input type="number" id="log_amount" placeholder="金额" inputmode="decimal" class="w-full bg-gray-50 rounded-xl px-4 py-2.5 outline-none text-sm">
                    <button onclick="addLog()" class="bg-purple-600 text-white rounded-xl font-bold text-sm shadow-md btn-active">记一笔</button>
                </div>
            </div>
            <div class="flex justify-between items-center mb-4">
                <span class="text-sm font-bold text-gray-600">收支记录</span>
                <div class="flex gap-1 bg-gray-100 rounded-lg p-1">
                    <button onclick="switchView('month')" id="view-month" class="px-3 py-1 text-xs rounded-md bg-white shadow text-purple-600 font-medium">按月</button>
                    <button onclick="switchView('week')" id="view-week" class="px-3 py-1 text-xs rounded-md text-gray-400">按周</button>
                </div>
            </div>
            <div id="logListContainer" class="space-y-4"></div>
        </div>
    </main>

    <!-- 快照回顾弹窗 -->
    <div id="snapshotModal" class="fixed inset-0 bg-white z-50 hidden flex flex-col overflow-hidden">
        <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200 flex-shrink-0">
            <button onclick="closeSnapshotModal()" class="flex items-center text-gray-600">
                <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                返回
            </button>
            <span class="font-bold text-gray-800">快照回顾</span>
            <div class="w-12"></div>
        </div>
        <div class="flex-1 flex overflow-hidden">
            <div class="w-13 border-r border-gray-200 p-3 bg-gray-50 flex-shrink-0" style="width:35%;max-height:50%;overflow-y:auto;" id="snapshotList"></div>
            <div class="flex-1 overflow-y-auto p-4" id="snapshotContent"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around items-center safe-area-inset-bottom h-16 z-50">
        <button onclick="switchTab('assets')" id="tab-assets" class="flex flex-col items-center active-tab">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M11.5 2C6.81 2 3 5.81 3 10.5S6.81 19 11.5 19h.5v3c0 .55.45 1 1 1s1-.45 1-1v-3c4.69 0 8.5-3.81 8.5-8.5S16.19 2 11.5 2zm0 15c-3.59 0-6.5-2.91-6.5-6.5S7.91 4 11.5 4 18 6.91 18 10.5 15.09 17 11.5 17z"/></svg>
            <span class="text-[10px] font-bold">资产概览</span>
        </button>
        <button onclick="switchTab('ledger')" id="tab-ledger" class="flex flex-col items-center text-gray-300">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
            <span class="text-[10px] font-bold">收支记事</span>
        </button>
    </nav>

    <script>
        const KEY_LOGS = 'asset_ledger_logs_v4';
        const KEY_ASSETS = 'asset_input_cache_v4';
        const KEY_VIEW = 'asset_view_mode_v4';
        const KEY_SNAPSHOTS = 'asset_snapshots_v4';

        let logData = JSON.parse(localStorage.getItem(KEY_LOGS) || '[]');
        let viewMode = localStorage.getItem(KEY_VIEW) || 'month';
        let selectedSnapshots = [];
        let snapshotViewMode = 'data';

        function formatMoney(num) {
            return new Intl.NumberFormat('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num);
        }

        function formatTime(timestamp) {
            return new Date(timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function getTodayStr() {
            return new Date().toISOString().substring(0, 10);
        }

        function calculateAssets() {
            let totalAssets = 0, subWx = 0, subAli = 0, subBank = 0;
            const currentInputs = {};
            document.querySelectorAll('input[type="number"]').forEach(input => {
                if (!input.id.startsWith('log_')) {
                    const val = parseFloat(input.value) || 0;
                    currentInputs[input.id] = input.value;
                    const group = input.getAttribute('data-group');
                    if (group === 'wx') subWx += val;
                    else if (group === 'ali') subAli += val;
                    else if (group === 'bank') subBank += val;
                }
            });
            localStorage.setItem(KEY_ASSETS, JSON.stringify(currentInputs));
            totalAssets = subWx + subAli + subBank;
            document.getElementById('sub_wx').innerText = formatMoney(subWx);
            document.getElementById('sub_ali').innerText = formatMoney(subAli);
            document.getElementById('sub_bank').innerText = formatMoney(subBank);
            document.getElementById('totalAssetsSummary').innerText = formatMoney(totalAssets);
            const adjL = parseFloat(document.getElementById('adj_lend').value) || 0;
            const adjS = parseFloat(document.getElementById('adj_shop').value) || 0;
            const adjF = parseFloat(document.getElementById('adj_family').value) || 0;
            const adjustment = adjL - adjS - adjF;
            const finalVal = totalAssets + adjustment;
            const resEl = document.getElementById('finalResult');
            resEl.innerText = formatMoney(finalVal);
            document.getElementById('totalAssetsHeader').innerText = formatMoney(totalAssets);
            document.getElementById('adjustmentValue').innerText = (adjustment >= 0 ? '+' : '') + formatMoney(adjustment);
            resEl.className = finalVal < 0 ? 'text-4xl font-bold text-red-400' : 'text-4xl font-bold text-white';
            return { actualVal: finalVal, totalAssets, adjustment, assets: currentInputs };
        }

        function calculateLedgerTotal() {
            const total = logData.reduce((sum, item) => sum + item.amount, 0);
            const { actualVal } = calculateAssets();
            const diff = actualVal - total;
            document.getElementById('ledgerTotal').innerText = formatMoney(total);
            const diffEl = document.getElementById('ledgerDiff');
            diffEl.innerText = (diff >= 0 ? '+' : '') + formatMoney(diff);
            diffEl.className = diff >= 0 ? 'text-orange-400' : 'text-green-400';
            return { ledgerTotal: total, diff };
        }

        function loadSavedData() {
            const saved = JSON.parse(localStorage.getItem(KEY_ASSETS) || '{}');
            for (let id in saved) { if (document.getElementById(id)) document.getElementById(id).value = saved[id]; }
            calculateAssets();
            calculateLedgerTotal();
        }

        function cleanOldSnapshots() {
            const snapshots = JSON.parse(localStorage.getItem(KEY_SNAPSHOTS) || '{}');
            const now = Date.now();
            const sevenDaysAgo = now - 7 * 24 * 60 * 60 * 1000;
            for (let date in snapshots) {
                snapshots[date] = snapshots[date].filter(s => s.timestamp > sevenDaysAgo);
                if (snapshots[date].length === 0) delete snapshots[date];
            }
            localStorage.setItem(KEY_SNAPSHOTS, JSON.stringify(snapshots));
        }

        function createSnapshot() {
            cleanOldSnapshots();
            const { actualVal, assets } = calculateAssets();
            const { ledgerTotal, diff } = calculateLedgerTotal();
            const today = getTodayStr();
            const snapshots = JSON.parse(localStorage.getItem(KEY_SNAPSHOTS) || '{}');
            if (!snapshots[today]) snapshots[today] = [];
            snapshots[today].push({
                timestamp: Date.now(),
                actualVal,
                ledgerTotal,
                diff,
                assets: JSON.parse(JSON.stringify(assets)),
                logs: JSON.parse(JSON.stringify(logData))
            });
            localStorage.setItem(KEY_SNAPSHOTS, JSON.stringify(snapshots));
            alert('快照已保存');
            renderSnapshotModal();
        }

        function renderSnapshotModal() {
            document.getElementById('snapshotModal').classList.remove('hidden');
            const snapshots = JSON.parse(localStorage.getItem(KEY_SNAPSHOTS) || '{}');
            const allSnapshots = [];
            for (let date in snapshots) {
                snapshots[date].forEach((s, idx) => {
                    allSnapshots.push({ date, idx, ...s });
                });
            }
            allSnapshots.sort((a, b) => b.timestamp - a.timestamp);
            const listEl = document.getElementById('snapshotList');
            if (allSnapshots.length === 0) {
                listEl.innerHTML = '<div class="text-center text-gray-400 text-sm py-4">暂无快照<br>点击"生成快照"保存当前状态</div>';
                document.getElementById('snapshotContent').innerHTML = '';
                selectedSnapshots = [];
                return;
            }
            if (selectedSnapshots.length === 0) {
                selectedSnapshots = allSnapshots.slice(0, 2);
            }
            listEl.innerHTML = allSnapshots.map((s, i) => {
                const isSelected = selectedSnapshots.some(ss => ss.date === s.date && ss.idx === s.idx);
                const time = formatTime(s.timestamp);
                const dateShort = s.date.substring(5);
                const diffStr = (s.diff >= 0 ? '+' : '') + formatMoney(s.diff);
                return `
                    <div class="snapshot-item mb-2 p-2 rounded-lg border border-gray-200 cursor-pointer transition-all ${isSelected ? 'selected' : 'bg-white'}" 
                         onclick="toggleSnapshotSelection(${i})">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <input type="checkbox" ${isSelected ? 'checked' : ''} class="mr-2 w-4 h-4" onclick="event.stopPropagation();toggleSnapshotSelection(${i})">
                                <span class="text-xs font-medium text-gray-700">${dateShort} ${time}</span>
                            </div>
                            <button onclick="event.stopPropagation();deleteSnapshot('${s.date}', ${s.idx})" class="text-gray-400 hover:text-red-500 text-xs">×</button>
                        </div>
                        <div class="text-[10px] text-gray-500 mt-1 ml-6">
                            实际:<span class="text-gray-700">${formatMoney(s.actualVal)}</span> 
                            差异:<span class="${s.diff >= 0 ? 'text-orange-500' : 'text-green-500'}">${diffStr}</span>
                        </div>
                    </div>
                `;
            }).join('');
            renderComparison();
        }

        function toggleSnapshotSelection(index) {
            const snapshots = JSON.parse(localStorage.getItem(KEY_SNAPSHOTS) || '{}');
            const allSnapshots = [];
            for (let date in snapshots) {
                snapshots[date].forEach((s, idx) => { allSnapshots.push({ date, idx, ...s }); });
            }
            allSnapshots.sort((a, b) => b.timestamp - a.timestamp);
            const target = allSnapshots[index];
            const exists = selectedSnapshots.findIndex(s => s.date === target.date && s.idx === target.idx);
            if (exists >= 0) {
                selectedSnapshots.splice(exists, 1);
            } else if (selectedSnapshots.length < 2) {
                selectedSnapshots.push(target);
            }
            if (selectedSnapshots.length > 2) selectedSnapshots = selectedSnapshots.slice(0, 2);
            renderSnapshotModal();
        }

        function deleteSnapshot(date, idx) {
            if (!confirm('确定删除此快照？')) return;
            const snapshots = JSON.parse(localStorage.getItem(KEY_SNAPSHOTS) || '{}');
            snapshots[date].splice(idx, 1);
            if (snapshots[date].length === 0) delete snapshots[date];
            localStorage.setItem(KEY_SNAPSHOTS, JSON.stringify(snapshots));
            renderSnapshotModal();
        }

        function renderComparison() {
            const contentEl = document.getElementById('snapshotContent');
            if (selectedSnapshots.length === 0) {
                contentEl.innerHTML = '<div class="text-center text-gray-400 py-10">请选择至少1个快照进行对比</div>';
                return;
            }
            const current = calculateAssets();
            const { ledgerTotal, diff } = calculateLedgerTotal();
            selectedSnapshots.sort((a, b) => a.timestamp - b.timestamp);
            const isTwoSnapshots = selectedSnapshots.length === 2;
            let cols, currentLabel;
            if (isTwoSnapshots) {
                const s1 = selectedSnapshots[0], s2 = selectedSnapshots[1];
                cols = [`${s1.date.substring(5)} ${formatTime(s1.timestamp)}`, `${s2.date.substring(5)} ${formatTime(s2.timestamp)}`];
            } else {
                cols = [...selectedSnapshots.map(s => `${s.date.substring(5)} ${formatTime(s.timestamp)}`), '当前'];
            }
            const rows = [
                { label: '实际可支配', key: 'actualVal', isCore: true },
                { label: '账面资产', key: 'ledgerTotal', isCore: true },
                { label: '差异', key: 'diff', isCore: true },
                { label: '微信-零钱', key: 'wx_lq' },
                { label: '微信-零钱通', key: 'wx_lqt' },
                { label: '微信-理财通', key: 'wx_lct' },
                { label: '支付宝-余额', key: 'ali_ye' },
                { label: '支付宝-余额宝', key: 'ali_yeb' },
                { label: '支付宝-余利宝', key: 'ali_ylb' },
                { label: '支付宝-理财', key: 'ali_lc' },
                { label: '银行卡-交行', key: 'bank_jt' },
                { label: '调整项-借出', key: 'adj_lend' },
                { label: '调整项-闲鱼店', key: 'adj_shop' },
                { label: '调整项-家庭', key: 'adj_family' }
            ];
            const getVal = (snap, key) => {
                if (!snap) return 0;
                if (key === 'actualVal') return snap.actualVal || 0;
                if (key === 'ledgerTotal') return snap.ledgerTotal || 0;
                if (key === 'diff') return snap.diff || 0;
                if (!snap.assets) return 0;
                return parseFloat(snap.assets[key]) || 0;
            };
            const currentVals = { actualVal: current.actualVal, ledgerTotal, diff, ...current.assets };
            let html = `
                <div class="flex justify-between items-center mb-4 px-2">
                    <span class="text-sm font-bold text-gray-600">已选 ${selectedSnapshots.length} 个</span>
                    <div class="flex gap-1 bg-gray-100 rounded-lg p-1">
                        <button onclick="switchSnapshotView('data')" class="px-3 py-1 text-xs rounded-md ${snapshotViewMode === 'data' ? 'bg-white shadow text-purple-600 font-medium' : 'text-gray-400'}">数据</button>
                        <button onclick="switchSnapshotView('logs')" class="px-3 py-1 text-xs rounded-md ${snapshotViewMode === 'logs' ? 'bg-white shadow text-purple-600 font-medium' : 'text-gray-400'}">收支</button>
                        <button onclick="selectedSnapshots=[];renderSnapshotModal()" class="px-2 py-1 text-xs text-gray-400 ml-2">清空</button>
                    </div>
                </div>
            `;
            if (snapshotViewMode === 'data') {
                if (isTwoSnapshots) {
                    const s1 = selectedSnapshots[0], s2 = selectedSnapshots[1];
                    const s1Vals = {}, s2Vals = {};
                    rows.forEach(row => {
                        s1Vals[row.key] = getVal(s1, row.key);
                        s2Vals[row.key] = getVal(s2, row.key);
                    });
                    html += '<div class="space-y-2">';
                    rows.forEach(row => {
                        const v1 = s1Vals[row.key], v2 = s2Vals[row.key];
                        const change = v2 - v1;
                        if (change === 0) return;
                        const changeStr = (change > 0 ? '+' : '') + formatMoney(change);
                        const colorClass = change > 0 ? 'text-green-600' : 'text-red-600';
                        const arrow = change > 0 ? '↑' : '↓';
                        html += `
                            <div class="flex justify-between items-center p-3 bg-white rounded-lg border border-gray-200">
                                <div>
                                    <div class="font-medium text-gray-700 ${row.isCore ? 'font-bold' : ''}">${row.label}</div>
                                    <div class="text-xs text-gray-400">${formatMoney(v1)} → ${formatMoney(v2)}</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-lg font-bold ${colorClass}">${changeStr} ${arrow}</div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                } else {
                    html += '<div class="text-center text-gray-400 py-4">请选择2个快照对比数据</div>';
                }
            } else if (snapshotViewMode === 'logs') {
                const logs1 = (selectedSnapshots[0] && selectedSnapshots[0].logs) || [];
                const logs2 = (selectedSnapshots[1] && selectedSnapshots[1].logs) || [];
                const keyOf = (l) => `${l.date}-${l.title}-${l.amount}`;
                const keys1 = new Set(logs1.map(keyOf));
                const keys2 = new Set(logs2.map(keyOf));
                const newLogs = logs2.filter(l => !keys1.has(keyOf(l)));
                const deletedLogs = logs1.filter(l => !keys2.has(keyOf(l)));
                html += '<div class="space-y-3">';
                if (newLogs.length > 0) {
                    html += `<div class="text-sm font-bold text-green-600">▼ 相比新增 (${newLogs.length}条)</div>`;
                    html += '<div class="space-y-2 mb-3">';
                    html += newLogs.sort((a,b) => new Date(b.date) - new Date(a.date)).map(l => `
                        <div class="flex justify-between items-center bg-green-50 p-2 rounded text-xs">
                            <span class="text-gray-700">${l.date.substring(5)} ${l.title}</span>
                            <span class="${l.amount >= 0 ? 'text-green-600' : 'text-red-600'} font-bold">${l.amount > 0 ? '+' : ''}${formatMoney(l.amount)}</span>
                        </div>
                    `).join('');
                    html += '</div>';
                }
                if (deletedLogs.length > 0) {
                    html += `<div class="text-sm font-bold text-red-600">▼ 相比删除 (${deletedLogs.length}条)</div>`;
                    html += '<div class="space-y-2">';
                    html += deletedLogs.sort((a,b) => new Date(b.date) - new Date(a.date)).map(l => `
                        <div class="flex justify-between items-center bg-red-50 p-2 rounded text-xs">
                            <span class="text-gray-700">${l.date.substring(5)} ${l.title}</span>
                            <span class="text-gray-500 font-medium">${l.amount > 0 ? '+' : ''}${formatMoney(l.amount)}</span>
                        </div>
                    `).join('');
                    html += '</div>';
                }
                if (newLogs.length === 0 && deletedLogs.length === 0) {
                    html += '<div class="text-center text-gray-400 py-4">收支明细无变化</div>';
                }
                html += '</div>';
            }
            contentEl.innerHTML = html;
        }

        function switchSnapshotView(mode) {
            snapshotViewMode = mode;
            renderComparison();
        }

        function closeSnapshotModal() {
            document.getElementById('snapshotModal').classList.add('hidden');
        }

        function exportData() {
            const fullData = {
                assets: localStorage.getItem(KEY_ASSETS),
                logs: localStorage.getItem(KEY_LOGS),
                snapshots: localStorage.getItem(KEY_SNAPSHOTS)
            };
            const text = JSON.stringify(fullData, null, 2);
            const blob = new Blob([text], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '资产账本备份_' + new Date().toISOString().substring(0, 10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
            alert('数据已下载为JSON文件');
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const data = JSON.parse(event.target.result);
                        if(data.assets) localStorage.setItem(KEY_ASSETS, data.assets);
                        if(data.logs) localStorage.setItem(KEY_LOGS, data.logs);
                        if(data.snapshots) localStorage.setItem(KEY_SNAPSHOTS, data.snapshots);
                        location.reload();
                    } catch(e) { alert('数据格式错误'); }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function addLog() {
            const title = document.getElementById('log_title').value.trim();
            const account = document.getElementById('log_account').value;
            const date = document.getElementById('log_date').value;
            const amount = parseFloat(document.getElementById('log_amount').value) || 0;
            const type = document.querySelector('input[name="log_type"]:checked').value;
            if (!title || amount === 0) return;
            const finalAmount = type === 'income' ? amount : -amount;
            logData.unshift({ id: Date.now(), title, account, date, amount: finalAmount, type });
            localStorage.setItem(KEY_LOGS, JSON.stringify(logData));
            renderLedger();
            calculateLedgerTotal();
            document.getElementById('log_title').value = '';
            document.getElementById('log_amount').value = '';
        }

        document.querySelectorAll('input[name="log_type"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.getElementById('type-expense').className = this.value === 'expense' 
                    ? 'text-center py-2 rounded-xl bg-red-50 text-red-500 border border-red-200 text-sm font-medium' 
                    : 'text-center py-2 rounded-xl bg-gray-50 text-gray-400 border border-gray-200 text-sm font-medium';
                document.getElementById('type-income').className = this.value === 'income' 
                    ? 'text-center py-2 rounded-xl bg-green-50 text-green-500 border border-green-200 text-sm font-medium' 
                    : 'text-center py-2 rounded-xl bg-gray-50 text-gray-400 border border-gray-200 text-sm font-medium';
            });
        });

        function deleteLog(id) {
            if(confirm('确定删除？')) {
                logData = logData.filter(l => l.id !== id);
                localStorage.setItem(KEY_LOGS, JSON.stringify(logData));
                renderLedger();
                calculateLedgerTotal();
            }
        }

        function getWeekKey(dateStr) {
            const d = new Date(dateStr);
            d.setHours(0, 0, 0, 0);
            const day = d.getDay();
            const diff = day === 0 ? -6 : 1 - day;
            d.setDate(d.getDate() + diff);
            return d.toISOString().substring(0, 10);
        }

        function formatWeekRange(weekKey) {
            const start = new Date(weekKey);
            const end = new Date(start);
            end.setDate(end.getDate() + 6);
            const fmt = d => `${d.getMonth() + 1}/${d.getDate()}`;
            return `${fmt(start)}-${fmt(end)}`;
        }

        function renderLedger() {
            const container = document.getElementById('logListContainer');
            if (!logData.length) { container.innerHTML = '<div class="text-center py-10 text-gray-300 italic text-sm">暂无记录</div>'; return; }
            const groups = {};
            logData.forEach(item => {
                if (!item.date) return;
                const key = viewMode === 'month' ? item.date.substring(0, 7) : getWeekKey(item.date);
                if (!groups[key]) groups[key] = { items: [], income: 0, expense: 0, total: 0 };
                groups[key].items.push(item);
                if (item.amount > 0) groups[key].income += item.amount;
                else groups[key].expense += Math.abs(item.amount);
                groups[key].total += item.amount;
            });
            const sorted = Object.keys(groups).sort().reverse();
            container.innerHTML = sorted.map(key => {
                const label = viewMode === 'month' ? key.replace('-','年') + '月' : formatWeekRange(key);
                const income = groups[key].income;
                const expense = groups[key].expense;
                const total = groups[key].total;
                return `
                    <div class="group-item">
                        <div class="group-header bg-white rounded-xl p-3 shadow-sm flex justify-between items-center" onclick="toggleGroup(this)">
                            <div class="flex items-center gap-2">
                                <svg class="w-4 h-4 text-gray-400 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                                <span class="font-bold text-gray-700">${label}</span>
                            </div>
                            <div class="flex items-center gap-3 text-xs">
                                <span class="text-green-600">收 ${formatMoney(income)}</span>
                                <span class="text-red-500">支 ${formatMoney(expense)}</span>
                                <span class="${total >= 0 ? 'text-green-600' : 'text-red-500'} font-bold">${total >= 0 ? '+' : ''}${formatMoney(total)}</span>
                            </div>
                        </div>
                        <div class="group-content space-y-2 mt-2 pl-2">
                            ${groups[key].items.map(l => `
                                <div class="bg-gray-50 p-3 rounded-lg flex justify-between items-center">
                                    <div><div class="text-sm font-medium text-gray-700">${l.title}</div><div class="text-[10px] text-gray-400">${l.date.substring(5)} · ${l.account}</div></div>
                                    <div class="flex items-center space-x-3">
                                        <span class="text-sm font-mono font-bold ${l.amount >= 0 ? 'text-green-600' : 'text-red-500'}">${l.amount > 0 ? '+' : ''}${formatMoney(l.amount)}</span>
                                        <button onclick="deleteLog(${l.id})" class="text-gray-300 hover:text-red-400">×</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleGroup(header) {
            const content = header.nextElementSibling;
            const arrow = header.querySelector('svg');
            content.classList.toggle('collapsed');
            arrow.classList.toggle('rotate-180');
        }

        function switchView(mode) {
            viewMode = mode;
            localStorage.setItem(KEY_VIEW, mode);
            document.getElementById('view-month').className = mode === 'month' 
                ? 'px-3 py-1 text-xs rounded-md bg-white shadow text-purple-600 font-medium' 
                : 'px-3 py-1 text-xs rounded-md text-gray-400';
            document.getElementById('view-week').className = mode === 'week' 
                ? 'px-3 py-1 text-xs rounded-md bg-white shadow text-purple-600 font-medium' 
                : 'px-3 py-1 text-xs rounded-md text-gray-400';
            renderLedger();
        }

        function switchTab(tab) {
            document.getElementById('page-assets').classList.toggle('hidden', tab !== 'assets');
            document.getElementById('page-ledger').classList.toggle('hidden', tab !== 'ledger');
            document.getElementById('tab-assets').className = tab === 'assets' ? 'flex flex-col items-center active-tab' : 'flex flex-col items-center text-gray-300';
            document.getElementById('tab-ledger').className = tab === 'ledger' ? 'flex flex-col items-center active-tab' : 'flex flex-col items-center text-gray-300';
            if(tab === 'ledger') { renderLedger(); calculateLedgerTotal(); }
        }

        function resetAssets() { if(confirm('确定清空填报数据？')) { localStorage.removeItem(KEY_ASSETS); location.reload(); } }

        document.querySelectorAll('input[type="number"]').forEach(input => {
            if (!input.id.startsWith('log_')) input.addEventListener('input', () => { calculateAssets(); calculateLedgerTotal(); });
            input.addEventListener('focus', function() { setTimeout(() => this.select(), 50); });
        });
        document.getElementById('log_date').valueAsDate = new Date();
        loadSavedData();
        switchView(viewMode);
    </script>
</body>
</html>
